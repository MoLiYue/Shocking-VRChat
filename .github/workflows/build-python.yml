name: Build Windows

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller --clean -y `
            --name shocking_vrchat `
            --add-data "templates;templates" `
            --add-data "wave_presets;wave_presets" `
            shocking_vrchat.py
        shell: pwsh

      - name: Create zip archive
        run: Compress-Archive -Path dist\shocking_vrchat\* -DestinationPath dist\shocking_vrchat_windows_x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shocking-vrchat-windows
          path: dist/shocking_vrchat_windows_x64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/shocking_vrchat_windows_x64.zip
          generate_release_notes: true
